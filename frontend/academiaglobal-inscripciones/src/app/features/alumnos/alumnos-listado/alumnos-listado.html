<section class="alumnos-section card p-4 my-4">
  <div class="section-header d-flex flex-column flex-md-row justify-content-between gap-3 mb-3">
    <div>
      <h2>Alumnos</h2>
      <p>Listado de alumnos con su programa y estatus actual.</p>
    </div>

    <div>
      <button
        type="button"
        class="secondary-button btn btn-outline-secondary"
        (click)="limpiarFiltros()"
      >
        Limpiar filtros
      </button>
    </div>
  </div>

  <div class="filters row g-3 mb-3">
    <div class="filter-field col-12 col-md-6">
      <label for="filtroEstatus" class="form-label">Filtrar por estatus</label>
      <select
        id="filtroEstatus"
        class="form-select"
        [ngModel]="filtroEstatus"
        (ngModelChange)="actualizarFiltroEstatus($event)"
      >
        <option value="">Todos</option>
        <option *ngFor="let estatus of estatusDisponibles" [value]="estatus">
          {{ formatearEstatus(estatus) }}
        </option>
      </select>
    </div>

    <div class="filter-field col-12 col-md-6">
      <label for="filtroPrograma" class="form-label">Filtrar por programa</label>
      <select
        id="filtroPrograma"
        class="form-select"
        [ngModel]="filtroPrograma"
        (ngModelChange)="actualizarFiltroPrograma($event)"
      >
        <option value="">Todos</option>
        <option *ngFor="let programa of programas$ | async" [value]="programa.id">
          {{ programa.nombre }}
        </option>
      </select>
    </div>
  </div>

  <div class="table-wrapper table-responsive">
    <table class="table table-hover align-middle">
      <thead>
        <tr>
          <th>Alumno</th>
          <th>Empresa</th>
          <th>Programa</th>
          <th>Estatus actual</th>
          <th>Fecha inscripción</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let alumno of alumnosFiltrados$ | async">
          <td>{{ alumno.nombre }}</td>
          <td>{{ alumno.empresa }}</td>
          <td>{{ alumno.programa }}</td>
          <td>
            <span class="status-badge badge bg-light text-dark">
              {{ formatearEstatus(alumno.estatusActual) }}
            </span>
          </td>
          <td>{{ alumno.fechaInscripcion }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <app-cambio-estatus></app-cambio-estatus>
</section>
