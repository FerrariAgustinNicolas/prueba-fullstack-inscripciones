<section class="registro-section card p-4 my-4">
  <h2>Registrar nuevo alumno</h2>

  <form class="row g-3" [formGroup]="registroForm" (ngSubmit)="registrarAlumno()">
    <div class="form-field col-12 col-md-6">
      <label for="nombre" class="form-label">Nombre</label>
      <input
        id="nombre"
        type="text"
        class="form-control"
        formControlName="nombre"
        placeholder="Ej. Juan Pérez"
      />
      <small *ngIf="campoInvalido('nombre')">
        El nombre es obligatorio y debe tener al menos 3 caracteres.
      </small>
    </div>

    <div class="form-field col-12 col-md-6">
      <label for="empresa" class="form-label">Empresa</label>
      <input
        id="empresa"
        type="text"
        class="form-control"
        formControlName="empresa"
        placeholder="Ej. Soriana"
      />
      <small *ngIf="campoInvalido('empresa')">
        La empresa es obligatoria.
      </small>
    </div>

    <div class="form-field col-12 col-md-6">
      <label for="programaId" class="form-label">Programa</label>
      <select
        id="programaId"
        class="form-select"
        formControlName="programaId"
      >
        <option value="">Seleccionar programa</option>
        <option
          *ngFor="let programa of programas$ | async"
          [value]="programa.id"
        >
          {{ programa.nombre }}
        </option>
      </select>
      <small *ngIf="campoInvalido('programaId')">
        El programa es obligatorio.
      </small>
    </div>

    <div class="form-field col-12 col-md-6">
      <label for="fechaInscripcion" class="form-label">Fecha de inscripción</label>
      <input
        id="fechaInscripcion"
        type="date"
        class="form-control"
        formControlName="fechaInscripcion"
      />
      <small *ngIf="campoInvalido('fechaInscripcion')">
        La fecha de inscripción es obligatoria.
      </small>
    </div>

    <div class="col-12">
    <button type="submit" class="btn btn-primary">
        Registrar alumno
    </button>
    </div>
  </form>
</section>
